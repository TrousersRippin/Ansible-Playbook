global:
  scrape_interval: 15s
  evaluation_interval: 15s
  body_size_limit: 15MB
  sample_limit: 10000
  target_limit: 50
  label_limit: 100
  label_name_length_limit: 200
  label_value_length_limit: 200

scrape_configs:
  - job_name: 'alloy'
    static_configs:
      - targets: ['alloy:12345']

  - job_name: "prometheus"
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: 'telegraf'
    scrape_interval: 10s
    static_configs:
      - targets: ["telegraf:9273"]