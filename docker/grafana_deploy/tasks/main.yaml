---
- name: Ensure Docker-Compose is installed
  ansible.builtin.package:
    name: docker-compose
    state: present

- name: Ensure Docker service is running
  ansible.builtin.service:
    name: docker
    state: started
    enabled: true

- name: Create a directory for compose file
  ansible.builtin.file:
    path: "/home/{{ USER }}/.config/compose/{{ APP }}"
    state: directory
    mode: '0755'
    owner: "{{ USER }}"
    group: "{{ USER }}"

- name: Create a directory for app container storage
  ansible.builtin.file:
    path: "/home/{{ USER }}/containers/storage/{{ APP }}"
    state: directory
    mode: '0755'
    owner: "{{ USER }}"
    group: "{{ USER }}"

- name: Create a directory for app container settings storage
  ansible.builtin.file:
    path: "/home/{{ USER }}/containers/storage/{{ APP }}/config"
    state: directory
    mode: '0777'
    owner: "{{ USER }}"
    group: "{{ USER }}"

- name: Create a directory for app container dashboard storage
  ansible.builtin.file:
    path: "/home/{{ USER }}/containers/storage/{{ APP }}/dashboards"
    state: directory
    mode: '0777'
    owner: "{{ USER }}"
    group: "{{ USER }}"

- name: Create a directory for app container data storage
  ansible.builtin.file:
    path: "/home/{{ USER }}/containers/storage/{{ APP }}/data"
    state: directory
    mode: '0777'
    owner: "{{ USER }}"
    group: "{{ USER }}"

- name: Create a directory for app container provisioning storage
  ansible.builtin.file:
    path: "/home/{{ USER }}/containers/storage/{{ APP }}/provisioning"
    state: directory
    mode: '0777'
    owner: "{{ USER }}"
    group: "{{ USER }}"

- name: Create a directory for app container provisioning alerting storage
  ansible.builtin.file:
    path: "/home/{{ USER }}/containers/storage/{{ APP }}/provisioning/alerting"
    state: directory
    mode: '0777'
    owner: "{{ USER }}"
    group: "{{ USER }}"

- name: Create a directory for app container provisioning dashboards storage
  ansible.builtin.file:
    path: "/home/{{ USER }}/containers/storage/{{ APP }}/provisioning/dashboards"
    state: directory
    mode: '0777'
    owner: "{{ USER }}"
    group: "{{ USER }}"

- name: Create a directory for app container provisioning datasources storage
  ansible.builtin.file:
    path: "/home/{{ USER }}/containers/storage/{{ APP }}/provisioning/datasources"
    state: directory
    mode: '0777'
    owner: "{{ USER }}"
    group: "{{ USER }}"

- name: Create a directory for app container provisioning plugins storage
  ansible.builtin.file:
    path: "/home/{{ USER }}/containers/storage/{{ APP }}/provisioning/plugins"
    state: directory
    mode: '0777'
    owner: "{{ USER }}"
    group: "{{ USER }}"

- name: Add grafana.ini
  ansible.builtin.copy:
    src: "files/grafana.ini"
    dest: "/home/{{ USER }}/containers/storage/{{ APP }}/config/grafana.ini"
    mode: '0644'
    owner: "{{ USER }}"
    group: "{{ USER }}"

- name: Add dashboards.yaml
  ansible.builtin.copy:
    src: "files/dashboards.yaml"
    dest: "/home/{{ USER }}/containers/storage/{{ APP }}/provisioning/dashboards/dashboards.yaml"
    mode: '0644'
    owner: "{{ USER }}"
    group: "{{ USER }}"

- name: Add datasources.yaml
  ansible.builtin.copy:
    src: "files/datasources.yaml"
    dest: "/home/{{ USER }}/containers/storage/{{ APP }}/provisioning/datasources/datasources.yaml"
    mode: '0644'
    owner: "{{ USER }}"
    group: "{{ USER }}"

- name: Add influxdb.json
  ansible.builtin.copy:
    src: "files/influxdb.json"
    dest: "/home/{{ USER }}/containers/storage/{{ APP }}/dashboards/influxdb.json"
    mode: '0644'
    owner: "{{ USER }}"
    group: "{{ USER }}"

- name: Add node-exporter.json
  ansible.builtin.copy:
    src: "files/node-exporter.json"
    dest: "/home/{{ USER }}/containers/storage/{{ APP }}/dashboards/node-exporter.json"
    mode: '0644'
    owner: "{{ USER }}"
    group: "{{ USER }}"

- name: Add compose file
  ansible.builtin.template:
    src: "templates/compose.yaml.j2"
    dest: "/home/{{ USER }}/.config/compose/{{ APP }}/compose.yaml"
    mode: '0644'
    owner: "{{ USER }}"
    group: "{{ USER }}"

- name: Ensure Docker image is present
  community.docker.docker_image:
    name: "{{ IMAGE_NAME }}"
    tag: "{{ IMAGE_TAG }}"
    source: pull

- name: Start Docker app
  community.docker.docker_compose_v2:
    project_src: "/home/{{ USER }}/.config/compose/{{ APP }}/"
    state: present