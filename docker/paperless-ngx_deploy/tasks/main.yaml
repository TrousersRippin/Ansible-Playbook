---
- name: Ensure Docker-Compose is installed
  ansible.builtin.package:
    name: docker-compose
    state: present

- name: Ensure Docker service is running
  ansible.builtin.service:
    name: docker
    state: started
    enabled: true

- name: Create a directory for compose file
  ansible.builtin.file:
    path: "/home/{{ USER }}/.config/compose/{{ APP }}"
    state: directory
    mode: '0755'
    owner: "{{ USER }}"
    group: "{{ USER }}"

- name: Create a directory for app container storage
  ansible.builtin.file:
    path: "/home/{{ USER }}/containers/storage/{{ APP }}"
    state: directory
    mode: '0755'
    owner: "{{ USER }}"
    group: "{{ USER }}"

- name: Create a directory for app container consume storage
  ansible.builtin.file:
    path: "/home/{{ USER }}/containers/storage/{{ APP }}/consume"
    state: directory
    mode: '0777'
    owner: "{{ USER }}"
    group: "{{ USER }}"

- name: Create a directory for app container data storage
  ansible.builtin.file:
    path: "/home/{{ USER }}/containers/storage/{{ APP }}/data"
    state: directory
    mode: '0777'
    owner: "{{ USER }}"
    group: "{{ USER }}"

- name: Create a directory for app container export storage
  ansible.builtin.file:
    path: "/home/{{ USER }}/containers/storage/{{ APP }}/export"
    state: directory
    mode: '0777'
    owner: "{{ USER }}"
    group: "{{ USER }}"

- name: Create a directory for app container media storage
  ansible.builtin.file:
    path: "/home/{{ USER }}/containers/storage/{{ APP }}/media"
    state: directory
    mode: '0777'
    owner: "{{ USER }}"
    group: "{{ USER }}"

- name: Add compose file
  ansible.builtin.template:
    src: "templates/compose.yaml.j2"
    dest: "/home/{{ USER }}/.config/compose/{{ APP }}/compose.yaml"
    mode: '0644'
    owner: "{{ USER }}"
    group: "{{ USER }}"

- name: Add env file
  ansible.builtin.template:
    src: "templates/env.j2"
    dest: "/home/{{ USER }}/.config/compose/{{ APP }}/.env"
    mode: '0644'
    owner: "{{ USER }}"
    group: "{{ USER }}"

- name: Ensure Docker image is present
  community.docker.docker_image:
    name: "{{ IMAGE_NAME }}"
    tag: "{{ IMAGE_TAG }}"
    source: pull

- name: Start Docker app
  community.docker.docker_compose_v2:
    project_src: "/home/{{ USER }}/.config/compose/{{ APP }}"
    state: present