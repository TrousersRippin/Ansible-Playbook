- name: Create Ansible remote_tmp directory
  ansible.builtin.file:
    path: /root/.cache/ansible/tmp
    state: directory
    mode: '0700'

- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: "{{ apt_cache_valid_time }}"

- name: Upgrade all packages
  ansible.builtin.apt:
    upgrade: full
  register: apt_upgrade_result
  notify: Apt upgrade summary

- name: Remove packages that are no longer required
  ansible.builtin.apt:
    autoremove: true
    purge: true

- name: Clean apt cache
  ansible.builtin.apt:
    clean: true

- name: Check if a reboot is required
  ansible.builtin.stat:
    path: /var/run/reboot-required
  register: reboot_required_file

- name: Display reboot status
  ansible.builtin.debug:
    msg: "{{ inventory_hostname }} {{ 'requires a reboot' if reboot_required_file.stat.exists else 'does not require a reboot' }}"

- name: Reboot if required
  ansible.builtin.reboot:
    msg: "{{ reboot_message }}"
    reboot_timeout: "{{ reboot_timeout }}"
    pre_reboot_delay: "{{ reboot_pre_delay }}"
    post_reboot_delay: "{{ reboot_post_delay }}"
    test_command: uptime
  when:
    - reboot_required_file.stat.exists
    - allow_reboot | bool