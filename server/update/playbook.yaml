---
- name: Server Update
  hosts: bare_metal:virtual_machines
  vars_files:
    - vars/main.yaml
  tasks:
    - ansible.builtin.import_tasks: tasks/main.yaml
  handlers:
    - ansible.builtin.import_tasks: handlers/main.yaml