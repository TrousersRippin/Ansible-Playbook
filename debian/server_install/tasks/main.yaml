---
- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true

- name: Upgrade distribution
  ansible.builtin.apt:
    upgrade: dist

- name: Remove unused dependencies
  ansible.builtin.apt:
    autoremove: true

- name: Set timezone
  ansible.builtin.timezone:
    name: "{{ TIMEZONE }}"

- name: Create SSH directory for root user
  ansible.builtin.file:
    path: "/root/.ssh"
    state: directory
    mode: '0700'

- name: Add SSH key to root user's authorized_keys
  ansible.builtin.authorized_key:
    user: root
    key: "{{ lookup('file', SSH_KEY_PATH) }}"
    state: present

- name: Generate password hash
  ansible.builtin.set_fact:
    hashed_password: "{{ NEW_USER_PASSWORD | password_hash('sha512') }}"

- name: Create group for new user
  ansible.builtin.group:
    name: "{{ NEW_USER_NAME }}"
    gid: 1000
    state: present

- name: Add user
  ansible.builtin.user:
    name: "{{ NEW_USER_NAME }}"
    comment: "{{ NEW_USER_FULLNAME }}"
    uid: 1000
    group: "{{ NEW_USER_NAME }}"
    create_home: true
    state: present
    groups: sudo
    append: true
    password: "{{ hashed_password }}"

- name: Configure sudo privileges for new user
  ansible.builtin.copy:
    dest: /etc/sudoers.d/{{ NEW_USER_NAME }}
    content: "{{ NEW_USER_NAME }} ALL=(ALL) NOPASSWD:ALL"
    mode: '0440'
    validate: /usr/sbin/visudo -cf %s

- name: Create .ssh directory for new user
  ansible.builtin.file:
    path: "/home/{{ NEW_USER_NAME }}/.ssh"
    state: directory
    owner: "{{ NEW_USER_NAME }}"
    group: "{{ NEW_USER_NAME }}"
    mode: '0700'

- name: Add SSH key to new user's authorized_keys
  ansible.builtin.authorized_key:
    user: "{{ NEW_USER_NAME }}"
    key: "{{ lookup('file', SSH_KEY_PATH) }}"
    state: present

- name: Create custom SSH config
  ansible.builtin.copy:
    dest: /etc/ssh/sshd_config.d/60-local.conf
    content: |
      HostKey /etc/ssh/ssh_host_ed25519_key
      PermitRootLogin no
      PubkeyAuthentication yes
      PasswordAuthentication no
    mode: '0600'
  notify: restart ssh

- name: Install packages
  ansible.builtin.apt:
    name:
      - curl
      - git
      - gpg
      - htop
      - nala
      - tree
      - vim
      - zsh
    state: present

- name: Install security packages
  ansible.builtin.apt:
    name:
      - fail2ban
      - unattended-upgrades
      - ufw
    state: present

- name: Create fail2ban jail.local file
  ansible.builtin.copy:
    dest: /etc/fail2ban/jail.local
    content: |
      [DEFAULT]
      ignoreip = 127.0.0.1/8 ::1 10.1.2.10
      bantime = 3600
      findtime = 600
      maxretry = 5

      [sshd]
      enabled = true
      backend = systemd

- name: Start and enable fail2ban service
  ansible.builtin.service:
    name: fail2ban
    state: started
    enabled: true

- name: Allow OpenSSH through firewall
  ansible.builtin.ufw:
    rule: allow
    name: OpenSSH

- name: Enable UFW with default deny policy
  ansible.builtin.ufw:
    state: enabled
    policy: deny

- name: Enable unattended-upgrades via debconf
  ansible.builtin.debconf:
    name: unattended-upgrades
    question: unattended-upgrades/enable_auto_updates
    value: "true"
    vtype: boolean

- name: Configure unattended-upgrades
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/50unattended-upgrades
    mode: '0644'
    content: |
      Unattended-Upgrade::Allowed-Origins {
          "${distro_id}:${distro_codename}";
          "${distro_id}:${distro_codename}-security";
          "${distro_id}ESMApps:${distro_codename}-apps-security";
          "${distro_id}ESM:${distro_codename}-infra-security";
      };
      Unattended-Upgrade::AutoFixInterruptedDpkg "true";
      Unattended-Upgrade::MinimalSteps "true";
      Unattended-Upgrade::InstallOnShutdown "false";
      Unattended-Upgrade::Remove-Unused-Dependencies "true";
      Unattended-Upgrade::Automatic-Reboot "false";

- name: Configure automatic update schedule
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    mode: '0644'
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Download-Upgradeable-Packages "1";
      APT::Periodic::Unattended-Upgrade "1";
      APT::Periodic::AutocleanInterval "7";

- name: Start and enable unattended-upgrades service
  ansible.builtin.service:
    name: unattended-upgrades
    state: started
    enabled: true

# NOTE: enp2s0 is hardcoded here — update if interface name differs on target host
- name: Edit console banner
  ansible.builtin.copy:
    dest: /etc/issue
    mode: '0644'
    content: |
      \S
      Kernel \r on an \m
      \d \t
      enp2s0: \4{enp2s0}